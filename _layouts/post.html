---
layout: default
---
<article class="post single-post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} • {{ page.author }}{% endif %}</p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
